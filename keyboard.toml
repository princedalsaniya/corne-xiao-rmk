[keyboard]
name = "Corne XIAO RMK"
product_name = "Corne XIAO RMK"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "princedalsaniya"
chip = "nrf52840"

[layout]
rows = 4
cols = 12
layers = 3
# 4 rows × 12 cols (6 per half) — 42 physical keys
# (3,0),(3,1),(3,10),(3,11) have no physical switch → "No"
keymap = [
    # ── Layer 0 · Base ────────────────────────────────────────────────────────
    [
        ["Tab",    "Q", "W", "E", "R", "T",   "Y", "U",         "I",         "O",   "P",         "Backspace"],
        ["LShift", "A", "S", "D", "F", "G",   "H", "J",         "K",         "L",   "Semicolon", "Quote"],
        ["LCtrl",  "Z", "X", "C", "V", "B",   "N", "M",         "Comma",     "Dot", "Slash",     "RAlt"],
        ["No", "No", "MO(1)", "LGui", "Space", "No",   "No", "Enter", "RShift", "MO(2)", "No", "No"]
    ],
    # ── Layer 1 · Raise ───────────────────────────────────────────────────────
    # Left thumb 1 held → this layer active
    [
        # Bootloader | BT_SEL 0-3 not supported in toml (use Vial to assign) | BT_CLR = ClearEeprom
        ["Bootloader", "No", "No", "No", "No", "ClearEeprom",
         "Kc1", "Kc2", "Kc3", "_", "Up", "_"],
        # wm_left=MACRO(0)  wm_right=MACRO(1)  wm_f=MACRO(2)  wm_m=MACRO(3)
        ["_", "MACRO(0)", "MACRO(1)", "MACRO(2)", "MACRO(3)", "_",
         "Kc4", "Kc5", "Kc6", "Left", "Down", "Right"],
        # copy=MACRO(4)  paste=MACRO(5)  cut=MACRO(6)
        ["_", "_", "_", "_", "_", "_",
         "Kc7", "Kc8", "Kc9", "MACRO(4)", "MACRO(5)", "MACRO(6)"],
        ["No", "No", "MO(1)", "_", "_", "No",   "No", "Enter", "Kc0", "_", "No", "No"]
    ],
    # ── Layer 2 · Lower ───────────────────────────────────────────────────────
    # Right thumb 3 held → this layer active
    [
        # ! @ # $ %  |  ` & ( ) *
        ["_",
         "WM(Kc1, LShift)", "WM(Kc2, LShift)", "WM(Kc3, LShift)", "WM(Kc4, LShift)", "WM(Kc5, LShift)",
         "WM(Grave, LAlt)", "WM(Kc7, LShift)", "WM(Kc9, LShift)", "WM(Kc0, LShift)", "WM(Kc8, LShift)", "_"],
        # media prev/play/next  |  - + [ ] \ ~
        ["_", "_", "_", "MediaPrevTrack", "MediaPlayPause", "MediaNextTrack",
         "Minus", "WM(Equal, LShift)", "LeftBracket", "RightBracket", "Backslash", "WM(Grave, LShift)"],
        # mute vol-dn vol-up  |  _ = { } | ^
        ["MACRO(7)", "MACRO(8)", "_", "AudioMute", "AudioVolDown", "AudioVolUp",
         "WM(Minus, LShift)", "Equal",
         "WM(LeftBracket, LShift)", "WM(RightBracket, LShift)", "WM(Backslash, LShift)", "WM(Kc6, LShift)"],
        ["No", "No", "_", "_", "_", "No",   "No", "_", "Bootloader", "MO(2)", "No", "No"]
    ],
]

# ── Macros ────────────────────────────────────────────────────────────────────
# MACRO(0) — wm_left: Cmd+Opt+Left (window move left)
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LAlt" },
    { operation = "tap",  keycode = "Left" },
    { operation = "up",   keycode = "LAlt" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(1) — wm_right: Cmd+Opt+Right (window move right)
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LAlt" },
    { operation = "tap",  keycode = "Right" },
    { operation = "up",   keycode = "LAlt" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(2) — wm_f: Cmd+Opt+F (fullscreen)
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LAlt" },
    { operation = "tap",  keycode = "F" },
    { operation = "up",   keycode = "LAlt" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(3) — wm_m: Cmd+Opt+M (minimize)
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LAlt" },
    { operation = "tap",  keycode = "M" },
    { operation = "up",   keycode = "LAlt" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(4) — copy: Cmd+C
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "tap",  keycode = "C" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(5) — paste: Cmd+V
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "tap",  keycode = "V" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(6) — cut: Cmd+Opt+C
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LAlt" },
    { operation = "tap",  keycode = "C" },
    { operation = "up",   keycode = "LAlt" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(7) — screenshot: Cmd+Shift+4
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LShift" },
    { operation = "tap",  keycode = "Kc4" },
    { operation = "up",   keycode = "LShift" },
    { operation = "up",   keycode = "LGui" },
]

# MACRO(8) — screenrecord: Cmd+Shift+5
[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LGui" },
    { operation = "down", keycode = "LShift" },
    { operation = "tap",  keycode = "Kc5" },
    { operation = "up",   keycode = "LShift" },
    { operation = "up",   keycode = "LGui" },
]

# ── BLE ───────────────────────────────────────────────────────────────────────
[ble]
enabled = true

# ── Split ─────────────────────────────────────────────────────────────────────
[split]
connection = "ble"

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0xAA, 0xBB, 0xCC, 0xDD, 0xEE, 0xC0]
# XIAO BLE battery: P0_31 (AIN7) through 2:1 on-board resistor divider.
battery_adc_pin = "P0_31"
adc_divider_measured = 1
adc_divider_total = 2

[split.central.display]
driver = "ssd1306"
size = "128x32"
# Mounted vertically, so the panel is rotated 90°. The renderer treats the
# logical framebuffer as 32 wide × 128 tall and handles per-section content
# orientation itself (battery upright at the top, layer text rotated below).
rotation = 90
renderer = "crate::display::LeftRenderer"
# Re-render at ~30 FPS for the idle "breathing" animation. Without this the
# display would only redraw on events, and the dither pulse wouldn't pulse.
render_interval = 33
min_render_interval = 10

[split.central.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_04"
scl = "P0_05"

[split.central.matrix]
matrix_type = "normal"
row_pins = ["P0_02", "P0_03", "P0_28", "P1_14"]
col_pins = ["P0_10", "P1_15", "P0_29", "P1_13", "P1_11", "P1_12"]

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0x11, 0x22, 0x33, 0x44, 0x55, 0xC1]
# Same voltage divider as central — identical XIAO BLE hardware.
battery_adc_pin = "P0_31"
adc_divider_measured = 1
adc_divider_total = 2

[split.peripheral.display]
driver = "ssd1306"
size = "128x32"
# Same vertical mount → Rotate90.
rotation = 90
renderer = "crate::display::RightRenderer"
render_interval = 33
min_render_interval = 10

[split.peripheral.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_04"
scl = "P0_05"

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_02", "P0_03", "P0_28", "P1_14"]
col_pins = ["P1_11", "P1_12", "P1_13", "P1_15", "P0_29", "P0_10"]

[rmk]
split_peripherals_num = 1
# Light sleep after 3 minutes of no key activity (180 s). The RMK central
# sleep manager (see rmk/src/split/ble/central.rs::sleep_manager_task) then:
#   - Drops the BLE split-link connection interval from 7.5 ms → 200 ms
#     (latency 30 → 25, supervision 5 s → 11 s) for substantial radio power
#     reduction while staying connected to the host.
#   - Sets the SLEEPING_STATE static to true and publishes SleepStateEvent,
#     which propagates over the split link so `ctx.sleeping` becomes true on
#     both halves' display renderers.
# Any key press immediately wakes both halves and restores the fast 7.5 ms
# connection interval (no reconnection delay observed by the host).
# 0 = disabled (RMK default). We don't set the value lower than the BLE
# supervision timeout to avoid spurious wakeups.
split_central_sleep_timeout_seconds = 180
